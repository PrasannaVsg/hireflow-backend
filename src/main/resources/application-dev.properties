spring.datasource.url=jdbc:postgresql://localhost:5432/hireflow
spring.datasource.username=hireflow
spring.datasource.password=hireflow
spring.datasource.hikari.maximum-pool-size=10

spring.data.redis.host=localhost
spring.data.redis.port=6379

hireflow.jwt.secret=dev-only-secret-please-override-this-with-32-bytes-minimum
hireflow.anthropic.api-key=${ANTHROPIC_API_KEY:sk-ant-dev-placeholder}
hireflow.voyage.api-key=${VOYAGE_API_KEY:pa-dev-placeholder}
hireflow.storage.endpoint=http://localhost:9000
hireflow.storage.access-key=minioadmin
hireflow.storage.secret-key=minioadmin
hireflow.storage.region=us-east-1

logging.level.com.hireflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG
