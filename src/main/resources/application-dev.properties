spring.datasource.url=jdbc:postgresql://localhost:5432/hireflow
spring.datasource.username=hireflow
spring.datasource.password=hireflow
spring.datasource.hikari.maximum-pool-size=10

spring.data.redis.host=localhost
spring.data.redis.port=6379

hireflow.jwt.secret=dev-only-secret-please-override-this-with-32-bytes-minimum
hireflow.anthropic.api-key=${ANTHROPIC_API_KEY:sk-ant-dev-placeholder}
hireflow.voyage.api-key=${VOYAGE_API_KEY:pa-dev-placeholder}
hireflow.storage.endpoint=http://localhost:9000
hireflow.storage.access-key=minioadmin
hireflow.storage.secret-key=minioadmin
hireflow.storage.region=us-east-1

logging.level.com.hireflow=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# iManner LLM Observability
obs.enabled=${OBS_ENABLED:false}
obs.api-endpoint=${OBS_API_ENDPOINT:https://app-855ea031-ingestion-api-dev.bravemeadow-fe76a673.eastus.azurecontainerapps.io}
obs.api-key=${OBS_API_KEY:dev-key}
obs.org-id=${OBS_ORG_ID:sageit}
obs.project-id=${OBS_PROJECT_ID:hireflow-backend-project}
obs.application-id=${OBS_APPLICATION_ID:hireflow-backend}
obs.application-name=${OBS_APPLICATION_NAME:HireFlow Backend}
obs.environment=${OBS_ENVIRONMENT:development}
obs.sampling-rate=${OBS_SAMPLING_RATE:1.0}
obs.pii-scrubbing=${OBS_PII_SCRUBBING_ENABLED:true}
