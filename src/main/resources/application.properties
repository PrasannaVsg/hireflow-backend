spring.application.name=hireflow-backend
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# JPA
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.format_sql=false

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Multipart
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=200MB

# Mail
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Server
server.port=8080
server.error.include-message=never
server.error.include-stacktrace=never
server.compression.enabled=true

# Actuator
management.endpoints.web.exposure.include=health,info,prometheus,metrics
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.metrics.tags.application=hireflow-backend
management.prometheus.metrics.export.enabled=true

# Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Logging
logging.level.com.hireflow=INFO
logging.level.org.springframework.security=WARN

# HireFlow
hireflow.mail.from=${MAIL_FROM:noreply@hireflow.io}
hireflow.jwt.secret=${JWT_SECRET:dev-only-secret-please-override-this-with-32-bytes-minimum}
hireflow.jwt.access-ttl-seconds=900
hireflow.jwt.refresh-ttl-seconds=604800
hireflow.jwt.issuer=hireflow
hireflow.anthropic.api-key=${ANTHROPIC_API_KEY:sk-ant-dev-placeholder}
hireflow.voyage.api-key=${VOYAGE_API_KEY:pa-dev-placeholder}
hireflow.anthropic.model=claude-sonnet-4-6
hireflow.anthropic.base-url=https://api.anthropic.com
hireflow.anthropic.version=2023-06-01
hireflow.anthropic.max-tokens=1024
hireflow.anthropic.max-retries=3
hireflow.anthropic.connect-timeout-ms=5000
hireflow.anthropic.rate-limit-per-min=50
hireflow.storage.bucket=hireflow-resumes
hireflow.storage.presign-ttl-seconds=600
