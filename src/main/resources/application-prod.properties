spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT:5432}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=30
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=20000

spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.ssl.enabled=true

hireflow.jwt.secret=${JWT_SECRET}
hireflow.anthropic.api-key=${ANTHROPIC_API_KEY}
hireflow.voyage.api-key=${VOYAGE_API_KEY}
hireflow.anthropic.rate-limit-per-min=${ANTHROPIC_RPM:100}
hireflow.storage.endpoint=${S3_ENDPOINT}
hireflow.storage.access-key=${S3_ACCESS_KEY}
hireflow.storage.secret-key=${S3_SECRET_KEY}
hireflow.storage.region=${S3_REGION:us-east-1}

server.forward-headers-strategy=framework

logging.level.com.hireflow=INFO
logging.level.root=WARN
